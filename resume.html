<!DOCTYPE html>
<html>
<head>
    <title>Your Resume</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }

        .container {
            background: white;
            padding: 20px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 0 10px gray;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid black;
            padding-bottom: 10px;
        }

        .header img {
            width: 120px;
            border-radius: 8px;
        }

        h1 {
            margin: 0;
        }

        h3 {
            border-bottom: 1px solid gray;
            padding-bottom: 5px;
        }

        .section {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    
    <div class="header">
        <div>
            <h1>{{ name }}</h1>
            <p>Email: {{ email }}</p>
            <p>Phone: {{ phone }}</p>
        </div>

        <img src="static/photo.png" width="150" style="float: right;">
    </div>

    
    <div class="section">
        <h3>Skills</h3>
        <pre>{{ skills }}</pre>
    </div>

    
    <div class="section">
        <h3>Education</h3>
        <pre>{{ education }}</pre>
    </div>

</div>

</body>
</html>
